<script>
/* petals */
for(let i=0;i<24;i++){
 let p=document.createElement('div');
 p.className='petal';
 p.innerHTML=Math.random()>.5?'🌸':'💮';
 p.style.left=Math.random()*100+'vw';
 p.style.top='-50px';
 p.style.fontSize=(14+Math.random()*14)+'px';
 p.style.animationDuration=(7+Math.random()*9)+'s';
 p.style.animationDelay=(Math.random()*5)+'s';
 document.body.appendChild(p);
}

/* countdown */
function updateCountdown(){
  const target = new Date("2026-11-12T00:00:00+05:00").getTime();
  const now = new Date().getTime();
  const diff = target - now;

  if(diff <= 0){
    document.getElementById('D').innerText = "0";
    document.getElementById('H').innerText = "0";
    document.getElementById('M').innerText = "0";
    document.getElementById('S').innerText = "0";
    document.getElementById('TH').innerText = "Nikah Mubarak ❤️";
    return;
  }

  const d = Math.floor(diff/(1000*60*60*24));
  const h = Math.floor((diff/(1000*60*60))%24);
  const m = Math.floor((diff/(1000*60))%60);
  const s = Math.floor((diff/1000)%60);

  document.getElementById('D').innerText = d;
  document.getElementById('H').innerText = h;
  document.getElementById('M').innerText = m;
  document.getElementById('S').innerText = s;
  document.getElementById('TH').innerText = Math.floor(diff/(1000*60*60)) + " Total Hours Left";
}
setInterval(updateCountdown,1000);
updateCountdown();

/* gallery slider */
let current=0;
const track=document.getElementById('ct');
const cards=document.querySelectorAll('.pol');
const dotsWrap=document.getElementById('cd');
const max=cards.length;

for(let i=0;i<max;i++){
 let dot=document.createElement('div');
 dot.className='cdot'+(i==0?' on':'');
 dot.onclick=()=>go(i);
 dotsWrap.appendChild(dot);
}

function updateDots(){
 document.querySelectorAll('.cdot').forEach((d,i)=>{
   d.classList.toggle('on',i===current);
 });
}

function go(i){
 current=i;
 track.style.transform='translateX(-'+(current*220)+'px)';
 updateDots();
}

function car(dir){
 current+=dir;
 if(current<0) current=max-1;
 if(current>=max) current=0;
 go(current);
}

/* photo fallback */
document.querySelectorAll('img').forEach(img=>{
 img.onerror=function(){
   if(this.src.indexOf('hero.jpg')===-1){
     this.src='hero.jpg';
   }
 }
});

/* secret popup */
function openSecret(){
 document.getElementById('popup').classList.add('on');
}
function closeSecret(){
 document.getElementById('popup').classList.remove('on');
}
window.openSecret=openSecret;
window.closeSecret=closeSecret;

/* AI section */
const aiReplies = [
"Har baat mein tumhari yaad aa hi jaati hai. Shayad isi ko mohabbat kehte hain. ❤️",
"Tum sirf meri kahani nahi — meri aadat ban chuki ho. 🌙",
"Jab tum chup hoti ho tab bhi tumhari baatein sunai deti hain. 💕",
"12 Nov sirf date nahi... meri zindagi ka naya janam hai. 💍",
"Har dafa sochta hoon — Allah ne tumhein meri dua ka jawab bana diya. ✨"
];

function askAI(){
 const input=document.getElementById('loveInput');
 const result=document.getElementById('aiResult');
 const text=document.getElementById('aiText');
 const loading=document.getElementById('aiLoading');

 loading.style.display='block';
 result.style.display='none';

 setTimeout(()=>{
   loading.style.display='none';
   result.style.display='block';
   text.innerText = aiReplies[Math.floor(Math.random()*aiReplies.length)];
 },1500);
}
window.askAI=askAI;

/* auto slide */
setInterval(()=>car(1),5000);
</script>
